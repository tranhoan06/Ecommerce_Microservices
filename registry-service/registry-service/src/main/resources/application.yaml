spring:
  application:
    name: registry-service


server:
  port: 8761

eureka:
  instance:
    hostname: localhost

  client:
    register-with-eureka: false  # k tự đăng ký chính nó vào danh sách
    fetch-registry: false # k tải danh sách từ danh sách khác
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/